<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO-PO Attainment Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
  :root {
    --bg:#f4f6f9;--surface:#fff;--surface2:#f0f3f7;--border:#e2e8f0;
    --text:#1a202c;--text2:#4a5568;--text3:#718096;
    --accent:#2563eb;--accent-light:#eff6ff;--accent-dark:#1d4ed8;
    --green:#16a34a;--green-light:#f0fdf4;
    --amber:#d97706;--amber-light:#fffbeb;
    --red:#dc2626;--red-light:#fef2f2;
    --purple:#7c3aed;--purple-light:#f5f3ff;
    --teal:#0d9488;--teal-light:#f0fdfa;
    --radius:10px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);}
  .auth-card{background:#fff;border-radius:16px;padding:2.5rem;width:420px;box-shadow:var(--shadow-md);}
  .auth-logo{text-align:center;margin-bottom:1.5rem;}
  .auth-logo img{width:80px;height:80px;object-fit:contain;margin-bottom:.75rem;}
  .auth-logo .inst-full{font-size:.78rem;color:#2563eb;font-weight:500;margin-top:4px;}
  .auth-logo h1{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#1e3a5f;}
  .auth-logo p{font-size:.8rem;color:var(--text3);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
  .auth-tabs{display:flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:1.5rem;gap:2px;}
  .auth-tab{flex:1;padding:.5rem;border:none;background:transparent;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text3);font-weight:500;transition:all .15s;}
  .auth-tab.active{background:#fff;color:var(--accent);box-shadow:var(--shadow);}
  .form-group{margin-bottom:1rem;}
  .form-group label{display:block;font-size:.8rem;font-weight:500;color:var(--text2);margin-bottom:.4rem;}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .15s;background:#fff;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
  .form-group textarea{resize:vertical;min-height:80px;}
  .btn{padding:.65rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.88rem;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn-success{background:var(--green);color:#fff;}
  .btn-success:hover{background:#15803d;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-warning{background:var(--amber);color:#fff;}
  .btn-full{width:100%;justify-content:center;}
  .btn-sm{padding:.35rem .75rem;font-size:.8rem;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .layout{display:flex;min-height:100vh;}
  .sidebar{width:240px;background:#1e3a5f;color:#fff;flex-shrink:0;display:flex;flex-direction:column;}
  .sidebar-header{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.1);}
  .sidebar-header h2{font-family:'DM Serif Display',serif;font-size:1.1rem;line-height:1.3;}
  .sidebar-header span{font-size:.72rem;opacity:.6;letter-spacing:.06em;text-transform:uppercase;}
  .sidebar-user{padding:.75rem 1.25rem;background:rgba(255,255,255,.08);margin:.75rem;border-radius:8px;}
  .sidebar-user .role-badge{font-size:.7rem;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;}
  .sidebar-user .name{font-size:.85rem;font-weight:500;margin-top:4px;}
  .sidebar-nav{flex:1;padding:.5rem;overflow-y:auto;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:.6rem .9rem;border-radius:8px;cursor:pointer;font-size:.85rem;color:rgba(255,255,255,.7);transition:all .15s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,.15);color:#fff;}
  .nav-icon{width:18px;height:18px;flex-shrink:0;}
  .sidebar-footer{padding:.75rem;border-top:1px solid rgba(255,255,255,.1);}
  .main{flex:1;overflow-y:auto;}
  .inst-bar{background:#fff;border-bottom:2px solid #1e3a5f;padding:.6rem 1.5rem;display:flex;align-items:center;gap:12px;}
  .inst-bar img{width:44px;height:44px;object-fit:contain;}
  .inst-bar-text{}
  .inst-bar-text .inst-name{font-family:'DM Serif Display',serif;font-size:.95rem;color:#1e3a5f;font-weight:600;line-height:1.2;}
  .inst-bar-text .inst-sub{font-size:.7rem;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;}
  .main-header{background:#fff;border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
  .main-header h1{font-size:1.1rem;font-weight:600;}
  .main-header h1{font-size:1.1rem;font-weight:600;}
  .content{padding:1.5rem;}
  .card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:1.25rem;}
  .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
  .card-header h3{font-size:.95rem;font-weight:600;}
  .card-body{padding:1.25rem;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .stat-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:1rem;box-shadow:var(--shadow);}
  .stat-card .label{font-size:.75rem;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
  .stat-card .value{font-size:1.8rem;font-weight:600;margin-top:4px;}
  .stat-card.blue .value{color:var(--accent);}
  .stat-card.green .value{color:var(--green);}
  .stat-card.purple .value{color:var(--purple);}
  .stat-card.amber .value{color:var(--amber);}
  table{width:100%;border-collapse:collapse;font-size:.85rem;}
  th{padding:.6rem .9rem;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);}
  td{padding:.7rem .9rem;border-bottom:1px solid var(--border);color:var(--text);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  .badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600;}
  .badge-blue{background:var(--accent-light);color:var(--accent);}
  .badge-green{background:var(--green-light);color:var(--green);}
  .badge-amber{background:var(--amber-light);color:var(--amber);}
  .badge-purple{background:var(--purple-light);color:var(--purple);}
  .badge-red{background:var(--red-light);color:var(--red);}
  .badge-teal{background:var(--teal-light);color:var(--teal);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal{background:#fff;border-radius:14px;padding:1.75rem;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal h2{font-size:1.1rem;font-weight:600;margin-bottom:1.25rem;}
  .modal-footer{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);}
  .attainment-table input[type=number]{width:70px;padding:.35rem .5rem;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;text-align:center;font-family:'DM Sans',sans-serif;background:#fff;}
  .attainment-table input[type=number]:focus{border-color:var(--accent);outline:none;}
  .level-high{color:var(--green);font-weight:600;}
  .level-mid{color:var(--amber);font-weight:600;}
  .level-low{color:var(--red);font-weight:600;}
  .co-po-table{overflow-x:auto;}
  .co-po-table table{min-width:700px;}
  .co-po-cell input{width:45px;padding:.25rem;border:1.5px solid var(--border);border-radius:4px;text-align:center;font-size:.82rem;font-family:'DM Sans',sans-serif;background:#fff;}
  .co-po-cell input:focus{border-color:var(--accent);outline:none;}
  .alert{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;}
  .alert-error{background:var(--red-light);color:var(--red);border:1px solid #fecaca;}
  .alert-success{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0;}
  .alert-info{background:var(--accent-light);color:var(--accent);border:1px solid #bfdbfe;}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);}
  .flex{display:flex;}
  .flex-between{display:flex;align-items:center;justify-content:space-between;}
  .gap-2{gap:.5rem;}
  .text-sm{font-size:.82rem;}
  .text-muted{color:var(--text3);}
  .mb-1{margin-bottom:.5rem;}
  .mb-2{margin-bottom:1rem;}
  .tag{display:inline-flex;align-items:center;background:var(--surface2);color:var(--text2);border-radius:6px;padding:2px 8px;font-size:.78rem;border:1px solid var(--border);}
  .drop-zone{border:2px dashed var(--border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;}
  .drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--accent-light);}
  .tab-strip{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
  .tab-btn{padding:.6rem 1.1rem;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
  .import-preview{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;font-size:.78rem;font-family:monospace;padding:.75rem;background:#f8fafc;white-space:pre-wrap;color:var(--text2);}
  .export-option{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);margin-bottom:.75rem;}
  .export-option .label{font-size:.88rem;font-weight:500;}
  .export-option .desc{font-size:.78rem;color:var(--text3);margin-top:2px;}
  /* Responsive */
  @media(max-width:768px){
    .sidebar{width:200px;}
    .stats-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:600px){
    .layout{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;}
    .sidebar-nav{display:flex;flex-direction:row;overflow-x:auto;}
  }
</style>
</head>

/* ═══════════════════════════════════════════════════════════════
   ATTAINMENT CALCULATIONS
═══════════════════════════════════════════════════════════════ */
function attLevel(pct){ return pct>80?3:pct>70?2:pct>60?1:0; }
function calcCOA(d,N){
  if(!N||d.cia1_p===''||d.cia2_p===''||d.assign_p===''||d.ese_p==='') return null;
  const a=attLevel((d.cia1_p/N)*100), b=attLevel((d.cia2_p/N)*100);
  const e=attLevel((d.assign_p/N)*100);
  const c=attLevel((d.ese_p/N)*100), dd=d.survey||0;
  const CIA=(a+b+e)/3, DA=0.4*CIA+0.6*c, IA=dd, COA=0.8*DA+0.2*IA;
  return{a,b,e,c,d:dd,CIA,DA,IA,COA};
}
function avgMapping(cos,mapping,po){
  let sum=0,cnt=0;
  cos.forEach(co=>{ const v=(mapping[co.id]||{})[po]; if(v&&v!=='-'){sum+=parseFloat(v);cnt++;} });
  return cnt>0?sum/cnt:null;
}

function exportCoursePDF(course,cos,mapping,attainmentData,db){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const N=course.totalStudents||0;
  const program=db.programs.find(p=>p.id===course.programId);

/* ═══════════════════════════════════════════════════════════════
   BULK IMPORT ENGINE
═══════════════════════════════════════════════════════════════ */
const TEMPLATES={
  courses:{
    headers:['course_code','course_name','semester','total_students','teacher_username'],
    sample:[['CE301','Fluid Mechanics','4th','52','t.singh'],['CE302','Soil Mechanics','4th','48','t.singh']]
  },
  outcomes:{
    headers:['course_code','co_label','co_description'],
    sample:[['CE301','CO1','Understand fluid properties and hydrostatics'],['CE301','CO2','Apply Bernoulli equation to real flow problems']]
  },
  attainment:{
    headers:['course_code','co_label','ct1_pass','ct2_pass','assign_pass','ese_pass','survey_level'],
    sample:[['CE301','CO1','42','38','40','48','3'],['CE301','CO2','35','30','33','45','2']]
  }
};
function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
  if(lines.length<2) return{headers:[],rows:[]};
  return{headers:lines[0],rows:lines.slice(1).filter(r=>r.some(c=>c))};
}
function importData(type,parsed,db,programId){
  const errors=[],warnings=[];
  let newDb={...db,courses:[...db.courses],users:[...db.users],
    courseOutcomes:{...db.courseOutcomes},attainmentData:{...db.attainmentData}};
  if(type==='courses'){
    parsed.rows.forEach((row,i)=>{
      const [code,name,semester,students,teacherUsername]=row;
      if(!code||!name){errors.push('Row '+(i+2)+': missing code or name');return;}
      if(newDb.courses.find(c=>c.code===code&&c.programId===programId)){warnings.push('Row '+(i+2)+': course '+code+' already exists - skipped');return;}
      const teacher=db.users.find(u=>u.username===teacherUsername&&u.role==='teacher');
      newDb.courses.push({id:'c'+Date.now()+i,code,name,semester:semester||'',totalStudents:parseInt(students)||0,programId,teacherId:teacher?.id||null});
    });
  } else if(type==='outcomes'){
    parsed.rows.forEach((row,i)=>{
      const [code,label,desc]=row;
      if(!code||!label||!desc){errors.push('Row '+(i+2)+': missing fields');return;}
      const course=newDb.courses.find(c=>c.code===code&&c.programId===programId);
      if(!course){errors.push('Row '+(i+2)+': course '+code+' not found in this programme');return;}
      const cos=newDb.courseOutcomes[course.id]||[];
      if(cos.find(co=>co.label===label)){warnings.push('Row '+(i+2)+': '+label+' in '+code+' already exists - skipped');return;}
      newDb.courseOutcomes={...newDb.courseOutcomes,[course.id]:[...cos,{id:'co'+Date.now()+i,label,desc}]};
    });
  } else if(type==='attainment'){
    parsed.rows.forEach((row,i)=>{
      const [code,label,cia1,cia2,assign,ese,survey]=row;
      if(!code||!label){errors.push('Row '+(i+2)+': missing fields');return;}
      const course=newDb.courses.find(c=>c.code===code&&c.programId===programId);
      if(!course){errors.push('Row '+(i+2)+': course '+code+' not found');return;}
      const co=(newDb.courseOutcomes[course.id]||[]).find(c=>c.label===label);
      if(!co){errors.push('Row '+(i+2)+': '+label+' not found in '+code);return;}
      newDb.attainmentData={...newDb.attainmentData,[course.id+'_'+co.id]:{cia1_p:parseInt(cia1)||0,cia2_p:parseInt(cia2)||0,assign_p:parseInt(assign)||0,ese_p:parseInt(ese)||0,survey:parseInt(survey)||0}};
    });
  }
  return{newDb,errors,warnings};
}
function downloadTemplate(type){
  const t=TEMPLATES[type];
  const csv=[t.headers.join(','),...t.sample.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='template_'+type+'.csv';a.click();
}
